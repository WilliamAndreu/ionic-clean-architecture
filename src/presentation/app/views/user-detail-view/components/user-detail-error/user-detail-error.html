<div class="flex flex-col gap-3">
  <div
    class="flex items-center gap-2.5 bg-red-500/6 border border-red-500/18 text-red-400/80 text-body px-4 py-3 rounded-xl"
  >
    {{ message | translate }}
  </div>

  @if (showLoginButton) {
    <button
      (click)="loginClick.emit()"
      class="w-full bg-white! text-bg-deep! font-semibold text-body py-3! rounded-xl! mt-1 transition-all duration-200 hover:bg-white/95!"
    >
      {{ 'auth.go_to_login' | translate }}
    </button>
  }
</div>
