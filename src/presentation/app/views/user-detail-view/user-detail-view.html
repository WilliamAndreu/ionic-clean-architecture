<app-detail-header backLabel="Products" backRoute="/" />

<ion-content>
  <main class="flex-1 flex items-center justify-center px-5 py-16">
    @if (vm.viewState.isLoading()) {
      <app-user-detail-loading />
    }

    @if (vm.viewState.error(); as error) {
      <app-user-detail-error
        [message]="error"
        [showLoginButton]="error === 'errors.auth.session_expired'"
        (loginClick)="vm.logout()"
      />
    }

    @if (vm.viewState.user(); as user) {
      <app-user-profile-card [user]="user" (logout)="vm.logout()" />
    }
  </main>
</ion-content>
